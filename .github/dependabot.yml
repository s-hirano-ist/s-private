version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    labels:
      - dependencies
    versioning-strategy: increase
    commit-message:
      prefix: chore
      include: scope
    cooldown:
      default-days: 2
    groups:
      production-non-major:
        dependency-type: production
        update-types:
          - patch
          - minor
      development-non-major:
        dependency-type: development
        update-types:
          - patch
          - minor

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: chore
    cooldown:
      default-days: 2
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker-compose
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: chore
    cooldown:
      default-days: 2
    ignore:
      - dependency-name: s0hirano/embedding-api
    groups:
      docker-compose:
        patterns:
          - "*"
