name: renovate

permissions: {}

on:
  schedule:
    # 毎日 16:00 UTC = 翌 01:00 JST に起動。実際の PR 生成は .github/renovate.json5 の
    # schedule / timezone(Asia/Tokyo) が gate する。この時刻なら
    #   - "before 11am on monday"            → 月曜 01:00 JST でヒット
    #   - 四半期 "before 5am on the 1st"      → 1日 01:00 JST でヒット
    # の両方の窓を取りこぼさない（窓外の日は Renovate 側で no-op になるだけ）。
    - cron: "0 16 * * *"
  workflow_dispatch:
    inputs:
      logLevel:
        description: ログレベル
        type: choice
        default: info
        options: [info, debug]
      dryRun:
        description: dry-run（書き込みなしでログ出力のみ）
        type: boolean
        default: false
  # Dependency Dashboard のチェックボックスを人間が toggle したら即時実行する。
  # Renovate(App bot) 自身の dashboard 更新も issues:edited を発火させるが、下の
  # job-level if が sender.type=Bot を弾くので自走ループ（run→dashboard更新→
  # issues:edited→別run→repository-changed abort）にはならない。PAT 版では編集者が
  # 人間ユーザと同一で sender フィルタが効かなかったため、このトリガーを外していた。
  issues:
    types: [edited]

concurrency:
  group: renovate
  cancel-in-progress: false

jobs:
  renovate:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    # 実際の repo write 権限は GitHub App トークンが持つため job の GITHUB_TOKEN は不要。
    permissions: {}
    # issues イベントは「人間が Dependency Dashboard issue を編集したとき」だけ通す。
    # App bot 自身の body 更新(sender.type=Bot)と無関係な issue 編集は弾き、
    # schedule / workflow_dispatch は常に通す。
    if: >-
      github.event_name != 'issues' ||
      (github.event.sender.type == 'User' &&
      github.event.issue.title == 'Dependency Dashboard')
    steps:
      # 専用 GitHub App の短命トークンを発行。GITHUB_TOKEN と異なり App トークンで
      # 作成した PR は ci.yaml 等のワークフローを発火できる（automerge 前提のため必須）。
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          # app-id は v3 で非推奨。Client ID（App ID とは別値の Iv23li... 形式）を使う。
          client-id: ${{ secrets.RENOVATE_CLIENT_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}
          # 生成トークンを最小権限に限定（metadata:read は常時付与）。
          #   contents            : ブランチ・コミット・lockfile 更新
          #   pull-requests       : PR 作成・automerge 有効化
          #   issues              : Dependency Dashboard issue の維持
          #   statuses            : minimumReleaseAge の内部チェックを renovate/stability-days という
          #     commit status として branch に書き込む。無いと POST /statuses が 403
          #     "Resource not accessible by integration" → Renovate が integration-unauthorized を
          #     repository-changed に変換し run 全体を中断、以降の PR が一切作られない。
          #     （App 側にも "Commit statuses: Read and write" の付与が必要。無いとトークン発行が 422）。
          #   vulnerability-alerts: Dependabot alerts を読み security ラベル付き脆弱性 PR を作る
          #     （renovate.json5 の vulnerabilityAlerts / :enableVulnerabilityAlertsWithLabel の前提。
          #      App 側にも "Dependabot alerts: Read" の付与が必要。無いとトークン発行が 422）。
          permission-contents: write
          permission-pull-requests: write
          permission-issues: write
          permission-statuses: write
          permission-vulnerability-alerts: read

      # self-host 実行。repo 設定 .github/renovate.json5 は Renovate が自動検出する
      # （configurationFile はグローバル設定用なので渡さない）。
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          token: ${{ steps.app-token.outputs.token }}
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_PLATFORM: github
          # App トークンで GitHub Contents API 経由の commit を行う。commit は App bot に
          # 自動帰属し "Verified" バッジが付くため、PAT 運用で必要だった gitAuthor 固定は不要。
          RENOVATE_PLATFORM_COMMIT: enabled
          # Mend Cloud 無料枠は 3GB cap で OOM kill されていた。ubuntu-24.04 runner は
          # 十分なメモリ(16GB)を持つので Renovate プロセス自身のヒープに 6GB 割り当てる。
          # pnpm 子プロセス側の上限は renovate.json5 の toolSettings.nodeMaxMemory(4096) が担保。
          NODE_OPTIONS: --max-old-space-size=6144
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          # dryRun=true のとき 'full'、それ以外は空＝通常実行。
          RENOVATE_DRY_RUN: ${{ inputs.dryRun && 'full' || '' }}
          # workflow_dispatch だけ schedule を無視して即時実行する（force で schedule を空に上書き）。
          # issues(Dependency Dashboard の checkbox)起動では force を付けない: force で schedule を
          # 全体平坦化すると「チェックした 1 項目だけ作る」という checkbox の意図に反して全 schedule
          # 待ち項目を作ってしまうため。checkbox の unschedule/unlimit セマンティクスに委ねる。
          RENOVATE_FORCE: ${{ github.event_name == 'workflow_dispatch' && '{"schedule":[]}' || '' }}
