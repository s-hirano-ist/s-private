name: renovate

permissions: {}

on:
  schedule:
    # 00:00 UTC Mon = 09:00 JST Mon。renovate.json5 内の
    # `before 11am on monday` 設定で PR 生成ウィンドウは Renovate 側でゲートされる。
    - cron: "0 0 * * 1"
  workflow_dispatch:
    inputs:
      logLevel:
        description: ログレベル
        type: choice
        default: info
        options: [info, debug]
      dryRun:
        description: dry-run (書き込みなしでログ出力のみ)
        type: boolean
        default: false
  # NOTE: `issues: edited` トリガーは外している。Renovate 自身が
  # Dependency Dashboard issue の body を毎回更新するため、トリガーを残すと
  # 「Renovate run が dashboard を更新 → issues:edited が発火 → 別の run が起動」
  # の自走ループになり大量の `repository-changed` abort を生む。
  # PAT 所有者と人間ユーザが同一なので sender フィルタも効かない。
  # Dashboard checkbox を toggle しても次の scheduled / workflow_dispatch run で
  # 読み取られるので機能は失われない (即時反応しなくなるだけ)。

jobs:
  renovate:
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    concurrency:
      group: renovate
      cancel-in-progress: false
    steps:
      - name: Self-hosted Renovate
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          # Mend Cloud は 3GB cap で OOM kill されていたため self-host へ移行。
          # ubuntu-24.04 runner は ~7GB メモリを持つので Node ヒープに 6GB 割り当てる。
          NODE_OPTIONS: --max-old-space-size=6144
          LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
          RENOVATE_DRY_RUN: ${{ inputs.dryRun && 'full' || '' }}
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          RENOVATE_PLATFORM: github
          # PAT 所有者 (s-hirano-ist) を commit author に固定。
          # 既定値の renovate@whitesourcesoftware.com は Mend 所有アドレスのため警告が出る。
          RENOVATE_GIT_AUTHOR: "s-hirano-ist <s-hirano-ist@users.noreply.github.com>"
          # schedule trigger 以外 (workflow_dispatch / issues / pull_request) は
          # ユーザの能動的なアクションなので renovate.json5 の schedule を無視して即時実行する。
          RENOVATE_FORCE: ${{ github.event_name != 'schedule' && '{"schedule":[]}' || '' }}
