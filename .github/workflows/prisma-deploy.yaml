name: prisma-deploy
permissions: {}

on:
  push:
    branches: [ main ]
    paths:
      - "packages/database/prisma/migrations/**"
  workflow_dispatch:
jobs:
  prisma-deploy:
    runs-on: ubuntu-24.04
    permissions: {}
    timeout-minutes: 10
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: ./.github/actions/setup-pnpm
      - run: pnpm --filter s-database prisma:generate
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
      - run: pnpm --filter s-database prisma:deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
