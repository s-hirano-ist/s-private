name: prisma-deploy
permissions: {}

on:
  push:
    branches: [ main ]
    paths:
      - "packages/database/prisma/migrations/**"
  workflow_dispatch:
jobs:
  prisma-deploy:
    runs-on: ubuntu-24.04
    permissions: {}
    timeout-minutes: 10
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - name: Checkout files
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          submodules: true

      - name: Install pnpm
        uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6
        with:
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: ".nvmrc"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm i --frozen-lockfile
      - run: pnpm --filter s-database prisma:generate
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
      - run: pnpm --filter s-database prisma:deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
