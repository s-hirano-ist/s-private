services:
  embedding-api:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9@sha256:16230cd8f679ae5f8a51d585033628b1c0d45cd70c2bc9b0d208170d71218fdb
    container_name: embedding-api
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3001"
    command: >-
      --model-id ${EMBEDDING_MODEL}
      --port 3001
      --pooling mean
    volumes:
      - hf-cache:/data
    networks:
      - tunnel-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 120s

  minio:
    image: pgsty/minio:RELEASE.2026-02-14T12-00-00Z-amd64@sha256:e6238b30c37e1143d80b71a6bea91446587009df5d7839f14659b11087d651fb
    container_name: minio
    profiles: [vps]
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - tunnel-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 3s
      retries: 3

  minio-init:
    image: pgsty/mc:RELEASE.2026-03-13T08-57-32Z-amd64@sha256:27e3c66b01d1e3922e0a9bd3eb9f532cb52f448942b7f5e37bae8d313835eb22
    container_name: minio-init
    profiles: [vps]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${MINIO_BUCKET_NAME} &&
      echo 'Bucket ready'
      "
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME}
    networks:
      - tunnel-net

  cloudflared:
    image: cloudflare/cloudflared:latest@sha256:404528c1cd63c3eb882c257ae524919e4376115e6fe57befca8d603656a91a4c
    container_name: cloudflared
    profiles: [vps]
    restart: unless-stopped
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - tunnel-net
    depends_on:
      embedding-api:
        condition: service_healthy

volumes:
  hf-cache:
  minio-data:

networks:
  tunnel-net:
    driver: bridge
