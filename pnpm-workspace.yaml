packages:
  - app
  - services/*
  - packages/*

savePrefix: ''

allowBuilds:
  '@memlab/cli': true
  '@parcel/watcher': true
  '@prisma/engines': true
  '@sentry/cli': true
  '@swc/core': true
  dprint: true
  esbuild: true
  memlab: true
  prisma: true
  puppeteer: true
  sharp: true
  sleep: true
  unrs-resolver: true

# pnpm 11 supply-chain security hardening
strictDepBuilds: true
blockExoticSubdeps: true
trustPolicy: no-downgrade

overrides:
  # Pinned to v7 so Storybook nextjs-vite remains compatible (see commit b058f2c)
  vite: ^7.3.1
  # Required while trustPolicy: no-downgrade rejects semver@5/6 (no provenance attestation; see commit 1d05046)
  'semver@<7': ^7.7.4
