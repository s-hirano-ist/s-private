packages:
  - app
  - services/*
  - packages/*

savePrefix: ''

overrides:
  '@hono/node-server@<1.19.13': '^2.0.8'
  '@tootallnate/once@<3.0.1': '^3.0.1'
  'ajv@>=7.0.0-alpha.0 <8.18.0': '^8.20.0'
  'brace-expansion@>=5.0.0 <5.0.6': '^5.0.7'
  'minimatch@>=10.0.0 <10.2.3': '^10.2.5'
  'mermaid@>=11.0.0-alpha.1 <=11.14.0': '^11.16.0'
  'path-to-regexp@<6.3.0': '^8.4.2'
  'path-to-regexp@>=8.0.0 <8.4.0': '^8.4.2'
  'postcss@<8.5.10': '^8.5.16'
  'qs@>=6.11.1 <=6.15.1': '^6.15.3'
  'smol-toml@<1.6.1': '^1.7.0'
  'srvx@<0.11.13': '^0.11.21'
  'tar@<7.5.8': '^7.5.19'
  'undici@<6.27.0': '^6.27.0'
  'undici@>=7.0.0 <7.28.0': '^7.28.0'
  'ws@>=8.0.0 <8.20.1': '^8.21.0'
  'hono@<4.12.25': '^4.12.27'
  'dompurify@<=3.4.10': '^3.4.11'
  'esbuild@>=0.27.3 <0.28.1': '^0.28.1'
  'markdown-it@<=14.1.1': '^14.3.0'
  '@opentelemetry/core@<2.8.0': '^2.8.0'
  'linkify-it@<=5.0.0': '^5.0.2'
  'js-yaml@<3.15.0': '^3.15.0'
  'js-yaml@>=4.0.0 <=4.1.1': '^4.3.0'

allowBuilds:
  '@parcel/watcher': true
  '@prisma/engines': true
  '@sentry/cli': true
  '@swc/core': true
  dprint: true
  esbuild: true
  prisma: true
  puppeteer: true
  sharp: false
  sleep: true
  unrs-resolver: true

# pnpm 11 supply-chain security hardening
strictDepBuilds: true
blockExoticSubdeps: true
patchedDependencies:
  eslint-plugin-unicorn@70.0.0: patches/eslint-plugin-unicorn@70.0.0.patch
