packages:
  - app
  - services/*
  - packages/*

savePrefix: ''

allowBuilds:
  '@memlab/cli': true
  '@parcel/watcher': true
  '@prisma/engines': true
  '@sentry/cli': true
  '@swc/core': true
  dprint: true
  esbuild: true
  memlab: true
  prisma: true
  puppeteer: true
  sharp: true
  sleep: true
  unrs-resolver: true

# pnpm 11 supply-chain security hardening
strictDepBuilds: true
blockExoticSubdeps: true
trustPolicy: no-downgrade

overrides:
  'cross-spawn@<7.0.5': 7.0.6
  'tar@<7.5.8': 7.5.14
  'minimatch@>=10.0.0 <10.2.1': 10.2.5
  'path-to-regexp@>=8.0.0 <8.4.0': 8.4.2
  'picomatch@>=4.0.0 <4.0.4': 4.0.4
  'hono@<4.12.4': 4.12.17
  '@hono/node-server@<1.19.10': 2.0.1
  'effect@>=3.0.0 <3.20.0': 3.21.2
  'undici@<6.21.1': 8.1.0
  'semver@<7': ^7.7.4
  vite: ^7.3.1
