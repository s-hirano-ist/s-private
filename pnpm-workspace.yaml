packages:
  - app
  - services/*
  - packages/*

savePrefix: ''

allowBuilds:
  '@memlab/cli': true
  '@parcel/watcher': true
  '@prisma/engines': true
  '@sentry/cli': true
  '@swc/core': true
  dprint: true
  esbuild: true
  memlab: true
  prisma: true
  puppeteer: true
  sharp: true
  sleep: true
  unrs-resolver: true

# pnpm 11 supply-chain security hardening
strictDepBuilds: true
blockExoticSubdeps: true
trustPolicy: no-downgrade
