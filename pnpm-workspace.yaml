packages:
  - app
  - services/*
  - packages/*

savePrefix: ''

overrides:
  '@hono/node-server@<1.19.13': '^1.19.14'
  '@tootallnate/once@<3.0.1': '^3.0.1'
  'ajv@>=7.0.0-alpha.0 <8.18.0': '^8.20.0'
  'brace-expansion@>=5.0.0 <5.0.6': '^5.0.6'
  'minimatch@>=10.0.0 <10.2.3': '^10.2.5'
  'mermaid@>=11.0.0-alpha.1 <=11.14.0': '^11.14.1'
  'path-to-regexp@<6.3.0': '^6.3.0'
  'path-to-regexp@>=8.0.0 <8.4.0': '^8.4.2'
  'postcss@<8.5.10': '^8.5.15'
  'qs@>=6.11.1 <=6.15.1': '^6.15.2'
  'smol-toml@<1.6.1': '^1.6.1'
  'srvx@<0.11.13': '^0.11.15'
  'tar@<7.5.8': '^7.5.15'
  'undici@<6.24.0': '^6.26.0'
  'ws@>=8.0.0 <8.20.1': '^8.20.1'

allowBuilds:
  '@parcel/watcher': true
  '@prisma/engines': true
  '@sentry/cli': true
  '@swc/core': true
  dprint: true
  esbuild: true
  prisma: true
  puppeteer: true
  sharp: true
  sleep: true
  unrs-resolver: true

# pnpm 11 supply-chain security hardening
strictDepBuilds: true
blockExoticSubdeps: true
